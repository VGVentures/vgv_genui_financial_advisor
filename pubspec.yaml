name: finance_app
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.38.1

dependencies:
  bloc: ^9.2.0
  dartantic_ai:
    git:
      url: https://github.com/brianegan/dartantic.git
      ref: 76fab07b7381dc0f8d4c55109798da80867c60d3
      path: packages/dartantic_ai
  dartantic_firebase_ai:
    git:
      url: https://github.com/brianegan/dartantic.git
      ref: 76fab07b7381dc0f8d4c55109798da80867c60d3
      path: packages/dartantic_firebase_ai
  equatable: ^2.0.8
  feature_flags_repository:
    path: packages/feature_flags_repository
  firebase_ai: ^3.9.0
  firebase_analytics: ^12.1.3
  firebase_app_check: ^0.4.1+4
  firebase_core: ^4.5.0
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.4
  genui:
    git:
      url: https://github.com/flutter/genui.git
      ref: 60c25b073fc7a47e1f356528cb96cc60ef60c5d5
      path: packages/genui
  intl: ^0.20.2
  json_schema_builder: ^0.1.3
  provider: ^6.1.2
  rxdart: ^0.28.0
  sentry_flutter: ^9.14.0
  shared_preferences: ^2.2.0
  streaming_shared_preferences: ^2.0.0
  wiredash:
    git:
      url: https://github.com/brianegan/wiredash-sdk.git
      ref: dc5595a500b7e8419b2efe4889b5fc745582b493

dependency_overrides:
  genai_primitives:
    git:
      url: https://github.com/flutter/genui.git
      ref: 60c25b073fc7a47e1f356528cb96cc60ef60c5d5
      path: packages/genai_primitives

dev_dependencies:
  bloc_lint: ^0.3.7
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.20
  build_runner: ^2.12.2
  flutter_gen_runner: ^5.13.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
  very_good_cli: ^1.0.0

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons_kick_off/
    - assets/images/
    - assets/images/intro/
    - assets/images/onboarding/
    - assets/images/sparkline_cards/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
