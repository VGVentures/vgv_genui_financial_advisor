name: genui_life_goal_simulator
description: Very Good Ventures Life Goal Simulator, powered by GenUI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.5
  flutter: ^3.41.7

dependencies:
  bloc: ^9.2.0
  dartantic_ai: ^3.4.0
  dartantic_firebase_ai: ^0.2.0
  equatable: ^2.0.8
  firebase_ai: ^3.10.0
  firebase_app_check: ^0.4.3
  firebase_core: ^4.7.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_svg: ^2.2.4
  genui: 0.8.0
  intl: ^0.20.2
  json_schema_builder: ^0.1.3
  provider: ^6.1.2
  rive: ^0.14.5
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5
  streaming_shared_preferences: ^2.0.0

dev_dependencies:
  bloc_lint: ^0.4.1
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.24
  build_runner: ^2.13.1
  flutter_gen_runner: ^5.13.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
  very_good_cli: ^1.1.1

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/images/advisor/
    - assets/images/intro/
    - assets/images/onboarding/
    - assets/images/sparkline_cards/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
